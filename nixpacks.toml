[phases.setup]
nixPkgs = ["nodejs_20", "python312"]

[phases.install]
cmds = [
    "npm install -g pnpm",
    "python -m venv /opt/venv",
    ". /opt/venv/bin/activate && pip install --upgrade pip",
    ". /opt/venv/bin/activate && cd backend && pip install -r requirements.txt",
    "cd frontend && pnpm install"
]

[phases.build]
cmds = [
    "cd frontend && pnpm run build"
]

[start]
cmd = ". /opt/venv/bin/activate && cd backend && flask db upgrade && gunicorn run:app --bind 0.0.0.0:$PORT"